name: "Came Connect Proxy"
version: "1.3.0"
slug: "came_connect_proxy"
description: "Local REST proxy for CAME Connect with PKCE auth"
startup: services
boot: auto
init: false
arch:
  - amd64
  - aarch64

ports:
  9002/tcp: 9002

options:
  client_id: ""
  client_secret: ""
  username: ""
  password: ""
  device_id: 0
  public_base_url: "http://192.168.1.104:9002"

schema:
  client_id: str
  client_secret: password
  username: str
  password: password
  device_id: int
  public_base_url: str
